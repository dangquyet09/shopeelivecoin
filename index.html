<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXX" crossorigin="anonymous"></script>

  <title>Săn Xu Live · Lịch Shopee Live tặng xu</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <span class="hero-badge"><i class="fa fa-bolt"></i> SHOPEE LIVE · SĂN XU</span>
    <h1 class="hero-title">Săn<span>Xu</span>Live</h1>

  <div class="notice"><i class="fa fa-exclamation-circle"></i> Nhớ theo dõi shop trước khi vào nhận xu</div>

  <div class="stats-bar">
    <div class="stat"><span class="stat-num" id="stat-count">0</span><span class="stat-label">phiên đang chờ</span></div>
    <div class="stat"><span class="stat-num" id="stat-coin">0</span><span class="stat-label">xu cao nhất</span></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-sort="time">⏳ Sắp diễn ra</button>
    <button class="filter-btn" data-sort="coin">💰 Xu cao nhất</button>
  </div>

  <div id="data-list" class="data-list"></div>
